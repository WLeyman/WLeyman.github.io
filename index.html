<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano set</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script src="index.js"></script>
    <h1>Test Title</h1>
    <div id="drum-machine">
      <div id="display">display</div>
      <div id="button-case">
        <button class="drum-pad" id="key-Q" onclick="playMusic(Q)">
          Q<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Heater-1.mp3"
            class="clip"
            id="Q"
          ></audio>
        </button>
        <button class="drum-pad" id="key-W" onclick="playMusic(W)">
          W<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Heater-2.mp3"
            class="clip"
            id="W"
          ></audio>
        </button>
        <button class="drum-pad" id="key-E" onclick="playMusic(E)">
          E<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Heater-3.mp3"
            class="clip"
            id="E"
          ></audio>
        </button>
        <button class="drum-pad" id="key-A" onclick="playMusic(A)">
          A<audio
            preload="auto"
            src="https://s3.amazonaws.com/freecodecamp/drums/Heater-4_1.mp3"
            class="clip"
            id="A"
          ></audio>
        </button>
        <button class="drum-pad" id="key-S" onclick="playMusic(S)">
          S<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Heater-6.mp3"
            class="clip"
            id="S"
          ></audio>
        </button>
        <button class="drum-pad" id="key-D" onclick="playMusic(D)">
          D<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Dsc_Oh.mp3"
            class="clip"
            id="D"
          ></audio>
        </button>
        <button class="drum-pad" id="key-Z" onclick="playMusic(Z)">
          Z<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Kick_n_Hat.mp3"
            class="clip"
            id="Z"
          ></audio>
        </button>
        <button class="drum-pad" id="key-X" onclick="playMusic(X)">
          X<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/RP4_KICK_1.mp3"
            class="clip"
            id="X"
          ></audio>
        </button>
        <button class="drum-pad" id="key-C" onclick="playMusic(C)">
          C<audio
            src="https://s3.amazonaws.com/freecodecamp/drums/Cev_H2.mp3"
            class="clip"
            id="C"
          ></audio>
        </button>
      </div>
    </div>
  </body>
</html>
